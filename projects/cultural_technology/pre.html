<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT 全解耦 DOM 版</title>
  <style>
    :root {
      --bg-0: #e7efe9;
      --bg-1: #dbe6df;
      --glass: rgba(255, 255, 255, 0.62);
      --line: rgba(255, 255, 255, 0.78);
      --ink: #0f241c;
      --shadow: 0 20px 55px rgba(7, 20, 15, 0.28);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --dur-layer: 960ms;
      --dur-slide: 1480ms;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Avenir Next", "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(145deg, var(--bg-0), var(--bg-1));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 46vw;
      height: 46vw;
      border-radius: 50%;
      pointer-events: none;
      z-index: -2;
      filter: blur(76px);
      opacity: 0.52;
      animation: drift 14s var(--ease) infinite alternate;
    }

    body::before {
      left: -14vw;
      top: -18vw;
      background: radial-gradient(circle, rgba(169, 211, 187, 0.84), transparent 68%);
    }

    body::after {
      right: -14vw;
      bottom: -18vw;
      background: radial-gradient(circle, rgba(132, 164, 214, 0.58), transparent 68%);
    }

    .ambient {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.56), transparent 30%),
        radial-gradient(circle at 82% 74%, rgba(255, 255, 255, 0.28), transparent 36%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(20, 28, 32, 0.24));
    }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      z-index: 90;
      background: rgba(255, 255, 255, 0.36);
    }

    .progress > i {
      display: block;
      width: 10%;
      height: 100%;
      background: linear-gradient(90deg, #2f8f67, #6fbe96);
      transition: width 500ms var(--ease);
    }

    .hud {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(14px) saturate(140%);
      box-shadow: var(--shadow);
      user-select: none;
    }

    .hud .meta {
      min-width: 72px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: #1f523e;
    }

    .hud button {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(22, 98, 69, 0.12);
      color: #1c6245;
      font-weight: 700;
      cursor: pointer;
      transition: transform 220ms ease, background 220ms ease;
    }

    .hud button:hover {
      transform: translateY(-1px);
      background: rgba(22, 98, 69, 0.22);
    }

    .deck {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 1400px;
      transform-style: preserve-3d;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transform: translate3d(0, 24px, -120px) scale(0.98);
      filter: blur(5px);
      transition: opacity var(--dur-layer) var(--ease), transform var(--dur-layer) var(--ease), filter var(--dur-layer) ease;
      z-index: 10;
      padding: 5.5vh 5vw;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate3d(0, 0, 0) scale(1);
      filter: blur(0);
      z-index: 20;
    }

    .slide.entering,
    .slide.leaving {
      transition: none;
      will-change: transform, opacity, filter, clip-path;
    }

    .slide.entering.forward { animation: inForward var(--dur-slide) var(--ease) both; }
    .slide.leaving.forward { animation: outForward var(--dur-slide) var(--ease) both; }
    .slide.entering.backward { animation: inBackward var(--dur-slide) var(--ease) both; }
    .slide.leaving.backward { animation: outBackward var(--dur-slide) var(--ease) both; }

    .slide.entering.fx-orbit.forward { animation-name: inOrbit; animation-duration: 1560ms; }
    .slide.leaving.fx-orbit.forward { animation-name: outOrbit; animation-duration: 1560ms; }
    .slide.entering.fx-fold.forward { animation-name: inFold; animation-duration: 1480ms; }
    .slide.leaving.fx-fold.forward { animation-name: outFold; animation-duration: 1480ms; }
    .slide.entering.fx-sweep.forward { animation-name: inSweep; animation-duration: 1500ms; }
    .slide.leaving.fx-sweep.forward { animation-name: outSweep; animation-duration: 1500ms; }

    .stage {
      position: relative;
      width: min(92vw, 160vh);
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow: 0 26px 72px rgba(6, 15, 12, 0.34);
      background: #fff;
      transform-style: preserve-3d;
      transition: transform 420ms var(--ease);
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: linear-gradient(130deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0) 24%);
      mix-blend-mode: screen;
    }

    .el {
      position: absolute;
      transform-origin: center center;
      overflow: hidden;
    }

    .el-image img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .el-shape {
      pointer-events: none;
    }

    .el-text {
      padding: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.25;
      outline: none;
      cursor: text;
      pointer-events: auto;
    }

    .el-text:focus {
      box-shadow: inset 0 0 0 2px rgba(52, 138, 96, 0.34);
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(2px);
    }

    .thumbs {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 95;
      max-height: 86vh;
      overflow: auto;
      padding: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(14, 19, 23, 0.34);
      backdrop-filter: blur(12px);
      display: grid;
      gap: 7px;
      scrollbar-width: thin;
    }

    .thumb {
      width: 86px;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.74;
      transition: opacity 220ms ease, border-color 220ms ease, transform 220ms ease;
      background: #111;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb.active {
      opacity: 1;
      border-color: rgba(255, 255, 255, 0.86);
      transform: translateX(2px);
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 96;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(15, 21, 25, 0.34);
      backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 8px 14px;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(2.2vw, -1.4vh, 0) scale(1.06); }
    }

    @keyframes inForward {
      from { opacity: 0; transform: translate3d(0, 12%, -240px) rotateX(9deg) scale(0.9); filter: blur(8px); }
      to { opacity: 1; transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); filter: blur(0); }
    }

    @keyframes outForward {
      from { opacity: 1; transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); filter: blur(0); }
      to { opacity: 0; transform: translate3d(0, -10%, -220px) rotateX(-7deg) scale(0.92); filter: blur(8px); }
    }

    @keyframes inBackward {
      from { opacity: 0; transform: translate3d(0, -12%, -240px) rotateX(-9deg) scale(0.9); filter: blur(8px); }
      to { opacity: 1; transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); filter: blur(0); }
    }

    @keyframes outBackward {
      from { opacity: 1; transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); filter: blur(0); }
      to { opacity: 0; transform: translate3d(0, 10%, -220px) rotateX(7deg) scale(0.92); filter: blur(8px); }
    }

    @keyframes inOrbit {
      from { opacity: 0; transform: translate3d(18vw, 6vh, -320px) rotateY(18deg) scale(0.86); filter: blur(12px); }
      to { opacity: 1; transform: translate3d(0, 0, 0) rotateY(0deg) scale(1); filter: blur(0); }
    }

    @keyframes outOrbit {
      from { opacity: 1; transform: translate3d(0, 0, 0) rotateY(0deg) scale(1); filter: blur(0); }
      to { opacity: 0; transform: translate3d(-18vw, -6vh, -320px) rotateY(-18deg) scale(0.86); filter: blur(12px); }
    }

    @keyframes inFold {
      from { opacity: 0; transform: translate3d(0, 0, -360px) rotateX(24deg) scale(0.84); filter: blur(14px); }
      to { opacity: 1; transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); filter: blur(0); }
    }

    @keyframes outFold {
      from { opacity: 1; transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); filter: blur(0); }
      to { opacity: 0; transform: translate3d(0, 0, -360px) rotateX(-24deg) scale(0.84); filter: blur(14px); }
    }

    @keyframes inSweep {
      from { opacity: 0; transform: translate3d(0, 0, -260px) rotateZ(-2deg) scale(0.9); clip-path: inset(0 100% 0 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0) rotateZ(0deg) scale(1); clip-path: inset(0 0 0 0); }
    }

    @keyframes outSweep {
      from { opacity: 1; transform: translate3d(0, 0, 0) rotateZ(0deg) scale(1); clip-path: inset(0 0 0 0); }
      to { opacity: 0; transform: translate3d(0, 0, -260px) rotateZ(2deg) scale(0.9); clip-path: inset(0 0 0 100%); }
    }

    @media (max-width: 980px) {
      .stage {
        width: min(98vw, 170vh);
        border-radius: 12px;
      }

      .thumbs {
        left: 6px;
        padding: 6px;
      }

      .thumb {
        width: 56px;
      }

      .hud {
        right: 8px;
        top: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="progress"><i id="progressBar"></i></div>

  <aside class="thumbs" id="thumbs" aria-label="Slide thumbnails"></aside>
  <main class="deck" id="deck" aria-live="polite"></main>

  <div class="hud">
    <button id="prevBtn" type="button">上一页</button>
    <span class="meta" id="pageInfo">01 / 10</span>
    <button id="nextBtn" type="button">下一页</button>
    <button id="jumpBtn" type="button">跳转</button>
  </div>

  <div class="hint">每个文字框都可直接编辑</div>

  <script src="./ppt_dom_data.js"></script>
  <script>
    const data = window.PPT_DOM_DATA;
    if (!data || !Array.isArray(data.slides)) {
      throw new Error("未找到 PPT_DOM_DATA，请确认 ppt_dom_data.js 存在");
    }

    const FX_SEQ = ["orbit", "sweep", "fold", "orbit", "sweep", "fold", "orbit", "sweep", "fold", "orbit"];

    const state = {
      current: 0,
      locked: false,
      wheelLock: false
    };

    const deck = document.getElementById("deck");
    const thumbsRoot = document.getElementById("thumbs");
    const progressBar = document.getElementById("progressBar");
    const pageInfo = document.getElementById("pageInfo");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const jumpBtn = document.getElementById("jumpBtn");

    const slideEls = [];
    const thumbEls = [];

    const W = data.slideWidth;
    const H = data.slideHeight;

    function toPctX(v) {
      return `${(v / W) * 100}%`;
    }

    function toPctY(v) {
      return `${(v / H) * 100}%`;
    }

    function alphaColor(hex, alpha = 1) {
      if (!hex || hex === "transparent") {
        return "transparent";
      }
      const h = hex.replace("#", "");
      const n = parseInt(h, 16);
      const r = (n >> 16) & 255;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function mapAlign(algn) {
      if (algn === "ctr") return "center";
      if (algn === "r") return "right";
      return "left";
    }

    function buildTextNode(shape) {
      const el = document.createElement("div");
      el.className = "el el-text";
      el.contentEditable = "true";
      el.spellcheck = false;

      el.style.left = toPctX(shape.x);
      el.style.top = toPctY(shape.y);
      el.style.width = toPctX(shape.w);
      el.style.height = toPctY(shape.h);
      el.style.transform = `rotate(${shape.rot || 0}deg)`;
      el.style.background = shape.fill && shape.fill !== "transparent" ? alphaColor(shape.fill, 0.94) : "transparent";
      if (shape.stroke && shape.stroke !== "transparent" && shape.strokeW > 0) {
        const px = Math.max(1, (shape.strokeW / 12700) * 0.7);
        el.style.border = `${px}px solid ${shape.stroke}`;
      }

      (shape.paragraphs || []).forEach((p, pIdx) => {
        const para = document.createElement("p");
        para.style.margin = "0";
        para.style.textAlign = mapAlign(p.align);
        para.style.whiteSpace = "pre-wrap";

        (p.runs || []).forEach((run) => {
          if (run.text === "\n") {
            para.appendChild(document.createElement("br"));
            return;
          }
          const span = document.createElement("span");
          span.textContent = run.text || "";
          span.style.fontFamily = run.font || "Noto Sans SC";
          span.style.fontSize = `${(run.size || 16) * 0.86}px`;
          span.style.color = run.color || "#223A33";
          span.style.fontWeight = run.bold ? "700" : "400";
          span.style.fontStyle = run.italic ? "italic" : "normal";
          span.style.textDecoration = run.underline ? "underline" : "none";
          para.appendChild(span);
        });

        el.appendChild(para);
        if (pIdx < shape.paragraphs.length - 1) {
          const br = document.createElement("div");
          br.style.height = "0.22em";
          el.appendChild(br);
        }
      });

      return el;
    }

    function buildShapeNode(shape) {
      const el = document.createElement("div");
      el.className = "el el-shape";
      el.style.left = toPctX(shape.x);
      el.style.top = toPctY(shape.y);
      el.style.width = toPctX(shape.w);
      el.style.height = toPctY(shape.h);
      el.style.transform = `rotate(${shape.rot || 0}deg)`;
      el.style.background = shape.fill && shape.fill !== "transparent" ? alphaColor(shape.fill, 1) : "transparent";

      if (shape.stroke && shape.stroke !== "transparent" && shape.strokeW > 0) {
        const px = Math.max(1, (shape.strokeW / 12700) * 0.7);
        el.style.border = `${px}px solid ${shape.stroke}`;
      }

      return el;
    }

    function buildImageNode(pic) {
      const el = document.createElement("div");
      el.className = "el el-image";
      el.style.left = toPctX(pic.x);
      el.style.top = toPctY(pic.y);
      el.style.width = toPctX(pic.w);
      el.style.height = toPctY(pic.h);
      el.style.transform = `rotate(${pic.rot || 0}deg)`;

      const img = document.createElement("img");
      img.src = pic.src || "";
      img.alt = "";
      el.appendChild(img);
      return el;
    }

    function createSlide(slideData, idx) {
      const slide = document.createElement("section");
      slide.className = "slide";
      slide.dataset.fx = FX_SEQ[idx % FX_SEQ.length];
      if (idx === 0) {
        slide.classList.add("active");
      }

      const stage = document.createElement("div");
      stage.className = "stage";
      stage.style.background = slideData.background || "#ffffff";

      (slideData.elements || []).forEach((el) => {
        if (el.type === "image" && el.src) {
          stage.appendChild(buildImageNode(el));
          return;
        }

        if (el.type === "shape") {
          if (el.paragraphs && el.paragraphs.length > 0) {
            stage.appendChild(buildTextNode(el));
          } else {
            stage.appendChild(buildShapeNode(el));
          }
        }
      });

      slide.appendChild(stage);

      slide.addEventListener("pointermove", (event) => {
        const rect = stage.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;
        const ry = (x - 0.5) * 3.8;
        const rx = (0.5 - y) * 2.8;
        stage.style.transform = `rotateX(${rx.toFixed(2)}deg) rotateY(${ry.toFixed(2)}deg)`;
      });

      slide.addEventListener("pointerleave", () => {
        stage.style.transform = "rotateX(0deg) rotateY(0deg)";
      });

      return slide;
    }

    function buildThumb(slideData, idx) {
      const thumb = document.createElement("button");
      thumb.className = "thumb";
      if (idx === 0) {
        thumb.classList.add("active");
      }

      const imageEl = (slideData.elements || []).find((it) => it.type === "image" && it.src);
      const img = document.createElement("img");
      img.src = imageEl ? imageEl.src : "";
      img.alt = "";
      thumb.appendChild(img);

      thumb.addEventListener("click", () => {
        const dir = idx > state.current ? 1 : -1;
        goTo(idx, dir);
      });

      return thumb;
    }

    function buildDeck() {
      data.slides.forEach((slideData, idx) => {
        const slide = createSlide(slideData, idx);
        deck.appendChild(slide);
        slideEls.push(slide);

        const thumb = buildThumb(slideData, idx);
        thumbsRoot.appendChild(thumb);
        thumbEls.push(thumb);
      });
    }

    function refreshUi(index) {
      const total = String(data.slides.length).padStart(2, "0");
      const curr = String(index + 1).padStart(2, "0");
      pageInfo.textContent = `${curr} / ${total}`;
      progressBar.style.width = `${((index + 1) / data.slides.length) * 100}%`;
      thumbEls.forEach((el, i) => el.classList.toggle("active", i === index));
    }

    function cleanClasses(node) {
      node.classList.remove("entering", "leaving", "forward", "backward", "fx-orbit", "fx-fold", "fx-sweep");
    }

    function goTo(target, dir = 1) {
      if (state.locked || target === state.current || target < 0 || target >= data.slides.length) {
        return;
      }

      state.locked = true;

      const current = slideEls[state.current];
      const next = slideEls[target];
      const directionClass = dir >= 0 ? "forward" : "backward";
      const fxClass = dir >= 0 ? `fx-${next.dataset.fx}` : "";

      cleanClasses(current);
      cleanClasses(next);

      current.classList.remove("active");
      current.classList.add("leaving", directionClass);
      next.classList.add("entering", directionClass);

      if (fxClass) {
        current.classList.add(fxClass);
        next.classList.add(fxClass);
      }

      refreshUi(target);

      window.setTimeout(() => {
        cleanClasses(current);
        cleanClasses(next);
        next.classList.add("active");
        state.current = target;
        state.locked = false;
      }, 1660);
    }

    function next() {
      goTo(state.current + 1, 1);
    }

    function prev() {
      goTo(state.current - 1, -1);
    }

    function bindEvents() {
      nextBtn.addEventListener("click", next);
      prevBtn.addEventListener("click", prev);

      jumpBtn.addEventListener("click", () => {
        const value = window.prompt(`输入页码 1-${data.slides.length}`);
        const page = Number(value);
        if (Number.isInteger(page) && page >= 1 && page <= data.slides.length) {
          goTo(page - 1, page - 1 > state.current ? 1 : -1);
        }
      });

      window.addEventListener("keydown", (event) => {
        if (["ArrowRight", "ArrowDown", "PageDown", " "].includes(event.key)) {
          event.preventDefault();
          next();
        }
        if (["ArrowLeft", "ArrowUp", "PageUp"].includes(event.key)) {
          event.preventDefault();
          prev();
        }
      });

      window.addEventListener("wheel", (event) => {
        if (state.wheelLock || Math.abs(event.deltaY) < 18) {
          return;
        }
        state.wheelLock = true;
        if (event.deltaY > 0) {
          next();
        } else {
          prev();
        }
        window.setTimeout(() => {
          state.wheelLock = false;
        }, 230);
      }, { passive: true });

      let startY = 0;
      window.addEventListener("touchstart", (event) => {
        startY = event.changedTouches[0].clientY;
      }, { passive: true });

      window.addEventListener("touchend", (event) => {
        const deltaY = event.changedTouches[0].clientY - startY;
        if (Math.abs(deltaY) < 36) {
          return;
        }
        if (deltaY < 0) {
          next();
        } else {
          prev();
        }
      }, { passive: true });
    }

    buildDeck();
    refreshUi(0);
    bindEvents();
  </script>
</body>
</html>
